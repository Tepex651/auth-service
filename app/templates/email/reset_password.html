<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
    <h1 class="text-2xl font-bold text-center mb-6">Reset password</h1>
    
    <form method="POST" action="/api/v1/auth/confirm-reset-password" class="space-y-4">
      <input type="hidden" name="token" value="{{ token }}">
      
      <div>
        <label class="block text-sm font-medium text-gray-700">New password</label>
        <input type="password" name="new_password" required 
               class="mt-1 block w-full border border-gray-300 rounded-md p-3 focus:ring-blue-500 focus:border-blue-500">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700">Confirm password</label>
        <input type="password" name="confirm_password" required 
               class="mt-1 block w-full border border-gray-300 rounded-md p-3 focus:ring-blue-500 focus:border-blue-500">
      </div>
      
      <button type="submit" 
              class="w-full bg-blue-600 text-white py-3 rounded-md font-medium hover:bg-blue-700 transition">
        Change password
      </button>
    </form>
    
    <p class="text-center text-sm text-gray-500 mt-6">
      Link is active 30 minutes
    </p>
  </div>
</body>
</html>
